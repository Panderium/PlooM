apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openbao-chart
  namespace: argocd
spec:
  project: default
  source:
    chart: openbao
    repoURL: https://openbao.github.io/openbao-helm
    targetRevision: 0.26.0
    helm:
      releaseName: openbao
  destination:
    server: "https://kubernetes.default.svc"
    namespace: openbao
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - Replace=true
      - ServerSideApply=true